<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Article preview component</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />

    <script
      src="https://kit.fontawesome.com/a16984c516.js"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="/js/script.js" defer></script>
  </head>
  <body>
    <main class="card-container">
      <img
        src="/images/drawers.jpg"
        alt="Two rooms and a vase with flowers under a green table."
        class="card-drawers"
      />

      <article class="card-info">
        <h1>
          Shift the overall look and feel by adding these wonderful touches to
          furniture in your home
        </h1>
        <p>
          Ever been in a room and felt like something was missing? Perhaps it
          felt slightly bare and uninviting. I’ve got some simple tips to help
          you make any room feel complete.
        </p>

        <div class="card-group">
          <div class="card-profile">
            <img
              src="/images/avatar-michelle.jpg"
              alt="Michelle Appleton avatar"
              class="card-avatar"
            />

            <div class="card-post">
              <span>Michelle Appleton</span>
              <time datetime="2020-06-12">28 Jun 2020</time>
            </div>
          </div>

          <div class="share-container">
            <button id="share-button" aria-label="Share button.">
              <i class="fa-solid fa-share"></i>
            </button>

            <div class="hidden">
              <div class="hidden-container">
                <span>Share</span>

                <div class="hidden-social-media">
                  <a href="#">
                    <i class="fa-brands fa-square-facebook"></i>
                  </a>

                  <a href="#">
                    <i class="fa-brands fa-x-twitter"></i>
                  </a>

                  <a href="#">
                    <i class="fa-brands fa-pinterest"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
